<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login · Painel La Maison</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #e8d5aa;
        --primary-deep: #d4bf8c;
        --text-primary: #2b2418;
        --text-secondary: #5c5342;
        --text-muted: #8b8068;
        --gold: #b4943f;
        --gold-dark: #9a7e2e;
        --danger: #c0392b;
        --border: rgba(180, 148, 63, 0.4);
        --radius: 8px;
        --shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Cormorant Garamond", Georgia, serif;
        background: #f9f2e2;
        color: var(--text-primary);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow: hidden;
      }

      /* Fundo com vídeo suave */
      .background-video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -2;
        opacity: 0.3;
        filter: brightness(0.7);
      }

      .background-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(232, 213, 170, 0.7);
        z-index: -1;
        backdrop-filter: blur(2px);
      }

      .login-container {
        background: rgba(255, 253, 247, 0.9);
        backdrop-filter: blur(15px);
        border-radius: 16px;
        box-shadow: var(--shadow);
        padding: 50px 40px;
        width: 100%;
        max-width: 420px;
        border: 1px solid var(--border);
        text-align: center;
        z-index: 1;
      }

      .login-header {
        margin-bottom: 35px;
      }

      .login-header h1 {
        font-family: "Playfair Display", serif;
        font-size: 2.4rem;
        font-weight: 600;
        letter-spacing: 2px;
        color: var(--text-primary);
        margin-bottom: 6px;
      }

      .login-header p {
        font-style: italic;
        color: var(--text-muted);
        letter-spacing: 1.5px;
        font-size: 0.95rem;
      }

      .divider-ornament {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin: 20px 0 30px;
      }

      .divider-ornament .line {
        width: 50px;
        height: 1px;
        background: var(--gold);
        opacity: 0.6;
      }

      .divider-ornament .diamond {
        width: 6px;
        height: 6px;
        background: var(--gold);
        transform: rotate(45deg);
        opacity: 0.8;
      }

      .form-group {
        margin-bottom: 22px;
        text-align: left;
      }

      label {
        display: block;
        font-family: "Lato", sans-serif;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--text-secondary);
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        font-family: "Cormorant Garamond", serif;
        font-size: 1rem;
        background: #fffdf7;
        color: var(--text-primary);
        transition: all 0.3s;
      }

      input:focus {
        outline: none;
        border-color: var(--gold);
        box-shadow: 0 0 0 3px rgba(180, 148, 63, 0.15);
      }

      .btn-login {
        width: 100%;
        padding: 14px;
        background: var(--text-primary);
        color: #fff;
        border: none;
        border-radius: var(--radius);
        font-family: "Lato", sans-serif;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        transition:
          background 0.3s,
          transform 0.2s;
        margin-top: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn-login:hover {
        background: #3f3628;
        transform: translateY(-1px);
      }

      .btn-login:active {
        transform: translateY(0);
      }

      .error-message {
        color: var(--danger);
        font-size: 0.8rem;
        margin-top: 15px;
        font-style: italic;
        min-height: 24px;
        opacity: 0;
        transition: opacity 0.3s;
      }

      .error-message.show {
        opacity: 1;
      }

      .back-link {
        display: inline-block;
        margin-top: 25px;
        font-family: "Lato", sans-serif;
        font-size: 0.7rem;
        letter-spacing: 1px;
        color: var(--text-muted);
        text-decoration: none;
        transition: color 0.3s;
      }

      .back-link:hover {
        color: var(--gold-dark);
      }

      @media (max-width: 500px) {
        .login-container {
          padding: 30px 25px;
          margin: 20px;
        }
        .login-header h1 {
          font-size: 1.8rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- Vídeo de fundo (cozinha) -->
    <video class="background-video" autoplay muted loop playsinline>
      <source
        src="https://videos.pexels.com/video-files/3196277/3196277-sd_640_360_25fps.mp4"
        type="video/mp4"
      />
      <img
        src="https://images.unsplash.com/photo-1556911220-e15b29be8c8f?auto=format&fit=crop&w=1200&q=80"
        alt="cozinha"
        style="
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          object-fit: cover;
          z-index: -2;
        "
      />
    </video>
    <div class="background-overlay"></div>

    <div class="login-container">
      <div class="login-header">
        <h1>La Maison</h1>
        <p>Painel Administrativo</p>
      </div>
      <div class="divider-ornament">
        <span class="line"></span>
        <span class="diamond"></span>
        <span class="line"></span>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label for="usuario">Usuário</label>
          <input
            type="text"
            id="usuario"
            name="usuario"
            placeholder="Digite seu usuário"
            required
            autocomplete="username"
          />
        </div>
        <div class="form-group">
          <label for="senha">Senha</label>
          <input
            type="password"
            id="senha"
            name="senha"
            placeholder="Digite sua senha"
            required
            autocomplete="current-password"
          />
        </div>
        <button type="submit" class="btn-login" id="btnLogin">
          <span>🔐</span> Entrar
        </button>
        <div class="error-message" id="errorMessage"></div>
      </form>
      <a
        href="#"
        class="back-link"
        onclick="
          history.back();
          return false;
        "
        >← Voltar ao cardápio</a
      >
    </div>

    <script>
      (function () {
        const form = document.getElementById("loginForm");
        const errorMsg = document.getElementById("errorMessage");
        const btnLogin = document.getElementById("btnLogin");

        // Credenciais de demonstração (substituir pela validação real da API)
        const CREDENCIAIS = {
          usuario: "admin",
          senha: "admin123",
        };

        form.addEventListener("submit", async (e) => {
          e.preventDefault();

          const usuario = document.getElementById("usuario").value.trim();
          const senha = document.getElementById("senha").value.trim();

          // Limpa mensagem anterior
          errorMsg.classList.remove("show");

          if (!usuario || !senha) {
            errorMsg.textContent = "Preencha todos os campos.";
            errorMsg.classList.add("show");
            return;
          }

          // Simula carregamento
          btnLogin.disabled = true;
          btnLogin.innerHTML =
            '<span class="loading-spinner" style="display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.8s linear infinite;"></span> Entrando...';

          // Simula delay de rede
          await new Promise((resolve) => setTimeout(resolve, 1200));

          // Validação
          if (usuario === CREDENCIAIS.usuario && senha === CREDENCIAIS.senha) {
            // Salva token fake (para demonstração)
            localStorage.setItem("laMaisonAuth", "true");
            localStorage.setItem("laMaisonUser", usuario);

            // Redireciona para o painel admin (substitua pelo caminho correto)
            window.location.href = "admin.html"; // ou o nome do arquivo do painel
          } else {
            errorMsg.textContent = "Usuário ou senha inválidos.";
            errorMsg.classList.add("show");
            btnLogin.disabled = false;
            btnLogin.innerHTML = "<span>🔐</span> Entrar";
          }
        });

        // Animação do spinner
        const style = document.createElement("style");
        style.textContent =
          "@keyframes spin { to { transform: rotate(360deg); } }";
        document.head.appendChild(style);
      })();
    </script>
  </body>
</html>
